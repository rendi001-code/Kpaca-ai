<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - KPACA AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient">
  <div class="auth-box">
    <h2>👋 Masuk ke KPACA AI</h2>
    <form action="/login" method="POST">
      <div class="form-group"><label>Nama Pengguna</label><input type="text" name="username" required></div>
      <div class="form-group"><label>Sandi</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary btn-block">Masuk</button>
    </form>
    <p class="text-center">Belum punya akun? <a href="/register">Daftar di sini</a></p>
  </div>
</body>
</html>
