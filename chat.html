<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrolan - KPACA AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="logo">✨ KPACA AI</div>
      <a href="/logout" class="btn btn-outline btn-sm">Keluar</a>
    </header>
    <div id="chat-box" class="chat-box">
      <div class="message ai">Halo! Selamat datang di KPACA AI. Tanyakan apa saja 😊</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="user-input" placeholder="Ketik pesan..." autocomplete="off">
      <button id="send-btn" class="btn btn-primary">Kirim</button>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
