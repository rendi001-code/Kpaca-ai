<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - KPACA AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient">
  <div class="auth-box">
    <h2>🚀 Buat Akun KPACA AI</h2>
    <form action="/register" method="POST">
      <div class="form-group"><label>Nama Pengguna</label><input type="text" name="username" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Sandi (min. 6 huruf)</label><input type="password" name="password" minlength="6" required></div>
      <button type="submit" class="btn btn-primary btn-block">Daftar</button>
    </form>
    <p class="text-center">Sudah punya akun? <a href="/login">Masuk di sini</a></p>
  </div>
</body>
</html>
